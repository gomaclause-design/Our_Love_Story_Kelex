<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-image: url('img/fondo.gif');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            gap: 30px;
        }

        h1 {
            color: white;
            font-size: 48px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            text-align: center;
        }

        .boton-azul {
            background-color: #7d2181;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            transition: background-color 0.3s ease;
        }

        .boton-azul:hover { 
            background-color: #800020;
        }
    </style>
</head>
<body>

    <h1>En desarrollo...</h1>
    
    <a href="index.html" class="boton-azul">Volver</a>

</body>
</html>
